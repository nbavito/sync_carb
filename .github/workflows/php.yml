name: Sync Prezzi API to Sheets

on:
  schedule:
    - cron: '*/15 * * * *' # Gira ogni 15 minuti (scelta consigliata per i limiti MiSE)
  workflow_dispatch: # Questo abilita il tasto "Run workflow"

jobs:
  run-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4 # Versione aggiornata

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl, json

      - name: Installa librerie Google
        run: composer require google/apiclient --no-interaction

      - name: Esegui lo script di sincronizzazione
        env:
          # Assicurati che questi nomi corrispondano a quelli nei "Secrets" di GitHub
          GOOGLE_CREDS: ${{ secrets.GOOGLE_CREDS }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          URL_LISTA_IMPIANTI: ${{ secrets.URL_LISTA_IMPIANTI }}
        run: php sync.php # <--- ATTENZIONE: Assicurati che il nome del file sia identico a quello nel repo
